# The main pipeline for Lab

resources:
  pipelines:
    Lab_etl:
      name: Lab_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/Lab_etl"

      libraries:
        - glob:
            include: ../src/Lab_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
